<form method="post" enctype="multipart/form-data" action="{{ formdata.0.url }}" class="js-create-form">
  {% csrf_token %}
  <div class="modal-header">
    <h2 class="text-lg font-semibold">Create {{ formdata.0.objname }}</h2>
    <button type="button" class="alert-close" data-modal-close aria-label="Close">&times;</button>
  </div>
  <div class="modal-body">
    {% include 'includes/partial_form.html' %}
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-modal-close>Cancel</button>
    <button type="submit" class="btn btn-primary">Create</button>
  </div>
</form>
