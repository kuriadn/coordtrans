{% for obj in data.1 %}
  <tr>
    {% for key, val in obj.0.items %}
      <td>{{ val }}</td>
    {% endfor %}
    <td class="text-right">
      <button type="button" class="btn btn-warning btn-sm js-update" data-url="{{ obj.1.update }}">Edit</button>
      <button type="button" class="btn btn-danger btn-sm js-delete" data-url="{{ obj.1.delete }}">Delete</button>
    </td>
  </tr>
{% empty %}
  <tr>
    <td colspan="20" class="text-center bg-amber-50 text-amber-800">No {{ data.0.new|title }} records yet.</td>
  </tr>
{% endfor %}
