<form method="post" action="{{ formdata.0.url }}" class="js-delete-form">
  {% csrf_token %}
  <div class="modal-header">
    <h2 class="text-lg font-semibold">Delete {{ formdata.0.objname }}</h2>
    <button type="button" class="alert-close" data-modal-close aria-label="Close">&times;</button>
  </div>
  <div class="modal-body">
    <p class="text-slate-700">Are you sure you want to delete <strong>{{ formdata.0.objtitle }}</strong>?</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-modal-close>Cancel</button>
    <button type="submit" class="btn btn-danger">Delete</button>
  </div>
</form>
