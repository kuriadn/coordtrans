{% load widget_tweaks %}

{% for field in formdata.1 %}
  <div class="mb-4">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {% render_field field class="form-input" %}
    {% for error in field.errors %}
      <p class="form-error">{{ error }}</p>
    {% endfor %}
  </div>
{% endfor %}
